<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CTGP-7 Creator</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
 <link rel="icon" href="icon_logo.png">

<body>
<canvas id="stars"></canvas>

<!-- HEADER -->
<div class="header">
  <img src="https://raw.githubusercontent.com/Mininator/CTGP-7-Creator/refs/heads/main/images/icon_logo.png" class="logo" alt="Logo">
  <div class="title">CTGP-7 Creator</div>

  <!-- Barre réseaux en haut à droite -->
  <div class="header-socials">
    <a href="#"><img src="https://upload.wikimedia.org/wikipedia/fr/thumb/4/4f/Discord_Logo_sans_texte.svg/1280px-Discord_Logo_sans_texte.svg.png" alt="Discord"></a>
    <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/GitHub_Invertocat_Logo.svg/1280px-GitHub_Invertocat_Logo.svg.png" alt="Github"></a>
    
  </div>
</div>

<!-- QR -->
<div class="device">
  <div class="qr">
    <img src="" alt="QR Code">
  </div>
</div>

<!-- BLOCKS -->
<div class="blocks">
  <div class="block">
    <div class="card">
      <img src="https://raw.githubusercontent.com/Mininator/CTGP-7-Creator/refs/heads/main/images/1block.png" alt="Block 1">
    </div>
  </div>

  <div class="block">
    <div class="card">
      <img src="https://raw.githubusercontent.com/Mininator/CTGP-7-Creator/refs/heads/main/images/2block.png" alt="Block 2">
    </div>
  </div>

  <div class="block">
    <div class="card">
      <img src="https://raw.githubusercontent.com/Mininator/CTGP-7-Creator/refs/heads/main/images/3block.png" alt="Block 3">
    </div>
  </div>
</div>



<script src="script.js"></script>
</body>
</html>
